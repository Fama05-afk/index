<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#FFFBEB 0%,#FEF3C7 60%,#FDE68A 100%);min-height:100vh;padding:20px}

.tab.on{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;transform:translateY(-3px);box-shadow:0 8px 24px rgba(30,58,138,.3)}

.pane{display:none}.pane.on{display:block;animation:up .35s ease}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card{background:white;border-radius:18px;padding:24px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.07);border:1.5px solid #FDE68A;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.10)}
.card.bl{border-left:5px solid #1E3A8A}.card.am{border-left:5px solid #F59E0B}
.card.pu{border-left:5px solid #7C3AED}.card.gr{border-left:5px solid #059669}
.code{background:#0F172A;color:#E2E8F0;font-family:'Fira Code',monospace;font-size:12px;line-height:1.8;padding:16px 18px;border-radius:12px;overflow-x:auto;white-space:pre;margin:12px 0;border:1.5px solid #334155}
.cm{color:#64748B}.ck{color:#7DD3FC}.cv{color:#FCD34D}.cs{color:#86EFAC}.ce{color:#F87171}.cn{color:#C4B5FD}.cf{color:#FB923C}
/* Concept cards */
.cbtn{width:100%;background:none;border:none;cursor:pointer;text-align:left;padding:0;font-family:'Poppins',sans-serif}
.crow{display:flex;align-items:center;gap:12px}
.cico{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cico.am{background:linear-gradient(135deg,#F59E0B,#FBBF24)}.cico.pu{background:linear-gradient(135deg,#7C3AED,#8B5CF6)}.cico.gr{background:linear-gradient(135deg,#059669,#10B981)}
.clbl{font-family:'Fira Code',monospace;font-size:13px;font-weight:600;color:#1E3A8A;margin-bottom:2px}
.csub{font-size:12.5px;color:#6B7280}
.carr{margin-left:auto;width:30px;height:30px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:17px;color:#9CA3AF;transition:all .25s;flex-shrink:0}

.cdet{margin-top:18px;padding-top:18px;border-top:1.5px dashed #FDE68A}

.badge.both{background:#D1FAE5;color:#065F46}.badge.count{background:#DBEAFE;color:#1E3A8A}.badge.rilex{background:#EDE9FE;color:#7C3AED}
.tips{display:flex;flex-direction:column;gap:7px;margin-top:12px;background:#FAFAF9;border-radius:10px;padding:12px 14px;border:1px solid #F0EDE8}
.tip{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:#374151;line-height:1.55}
.tdot{width:7px;height:7px;border-radius:50%;background:#F59E0B;flex-shrink:0;margin-top:5px}
/* Diff boxes */
.diffgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.dbox{border-radius:12px;padding:14px}
.dbox.count{background:#EFF6FF;border:1.5px solid #93C5FD}
.dbox.rilex{background:#F5F3FF;border:1.5px solid #C4B5FD}

.dbox-row:last-child{border:none}
/* Steps */
.etabs{display:flex;gap:8px;margin-bottom:18px}

.etab.on{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;box-shadow:0 4px 12px rgba(30,58,138,.3)}

.srow{display:flex;align-items:center;gap:12px}

.stit{font-size:13.5px;font-weight:600;color:#1E3A8A;flex:1}

.alertbox{background:#FEF2F2;border:1.5px solid #FCA5A5;border-radius:12px;padding:12px 16px;font-size:13px;color:#991B1B;line-height:1.65;margin-bottom:14px}
/* Inline highlight */
ic{font-family:'Fira Code',monospace;font-size:12.5px;background:#F1F5F9;border:1px solid #E2E8F0;border-radius:4px;padding:1px 5px;color:#1E3A8A}
/* Quiz */
.qprog{margin-bottom:20px}
.qptop{display:flex;justify-content:space-between;margin-bottom:6px}
.qplbl{font-size:13px;font-weight:600;color:#1E3A8A}.qpsco{font-size:13px;color:#6B7280}
.qptrack{height:7px;background:#E5E7EB;border-radius:50px;overflow:hidden}

.qcard{background:white;border-radius:16px;padding:20px 22px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.08);border:2px solid #1E3A8A}
.qtag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 10px;border-radius:50px;display:inline-block;margin-bottom:8px}
.qtag.count{background:#DBEAFE;color:#1E3A8A}.qtag.rilex{background:#EDE9FE;color:#7C3AED}.qtag.both{background:#D1FAE5;color:#065F46}.qtag.ezcli{background:#FEF3C7;color:#92400E}
.qq{font-family:'Fira Code',monospace;font-size:13px;font-weight:500;color:#1E3A8A;line-height:1.65}
.opt{display:block;width:100%;text-align:left;padding:11px 14px;border-radius:11px;cursor:pointer;margin-bottom:8px;font-size:12.5px;font-family:'Fira Code',monospace;line-height:1.4;transition:all .18s}
.opt.def{border:1.5px solid #E5E7EB;background:white;color:#374151}
.opt.def:hover{border-color:#1E3A8A;background:#EFF6FF;color:#1E3A8A;transform:translateX(4px)}
.opt.sel{border:2px solid #F59E0B;background:#FFFBEB;color:#92400E}

.expl{border-radius:11px;padding:13px 16px;font-size:13px;line-height:1.65;margin-bottom:14px}
.expl.ok{background:#ECFDF5;border:1.5px solid #6EE7B7;color:#065F46}
.expl.ko{background:#FFFBEB;border:1.5px solid #F59E0B;color:#92400E}
.qbtn{padding:12px 28px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .22s;font-family:'Poppins',sans-serif;border:none}
.qbtn.val{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;box-shadow:0 4px 12px rgba(30,58,138,.22)}
.qbtn.val:hover{transform:translateY(-2px)}.qbtn.val:disabled{background:#E5E7EB;color:#9CA3AF;box-shadow:none;cursor:not-allowed;transform:none}
.qbtn.nxt{background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white}.qbtn.nxt:hover{transform:translateY(-2px)}
.qbtn.rst{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white}
.scircle{width:118px;height:118px;border-radius:50%;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 8px 26px rgba(30,58,138,.28)}
.snum2{font-size:38px;font-weight:700;line-height:1}.stot2{font-size:14px;opacity:.8}
.spct{font-size:17px;font-weight:600;color:#F59E0B;margin-bottom:6px}
.smsg{font-size:13.5px;color:#6B7280;max-width:300px;margin:0 auto 22px;line-height:1.65}
/* Memo */
.msec{background:white;border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 3px 14px rgba(0,0,0,.07)}
.mhdr{padding:10px 18px}
.mhdr.bl{background:linear-gradient(135deg,#1E3A8A,#2563EB)}.mhdr.am{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.mhdr.gr{background:linear-gradient(135deg,#059669,#10B981)}.mhdr.rd{background:linear-gradient(135deg,#DC2626,#EF4444)}
.mhdr.pu{background:linear-gradient(135deg,#7C3AED,#8B5CF6)}.mhdr.gy{background:linear-gradient(135deg,#4B5563,#6B7280)}
.mcat{font-size:13px;font-weight:700;color:white}
.mrow{display:flex;align-items:flex-start;gap:10px;padding:9px 18px;border-bottom:1px solid #FEF3C7}
.mrow:last-child{border-bottom:none}
.mcode{font-family:'Fira Code',monospace;font-size:11.5px;color:#1E3A8A;font-weight:500;flex-shrink:0;min-width:210px}
.mdesc{font-size:12.5px;color:#374151;line-height:1.5;flex:1}
.mexo{font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px;flex-shrink:0}
.mexo.b{background:#D1FAE5;color:#065F46}.mexo.c{background:#DBEAFE;color:#1E3A8A}.mexo.r{background:#EDE9FE;color:#7C3AED}
</style>

<script>
// ══════════════════════════════════════════════════════════════════
// CONCEPTS — fidèles aux deux corrigés
// ══════════════════════════════════════════════════════════════════
const CONCEPTS = [

// ── 1. from ezCLI import * ──────────────────────────────────────
{
ico:'📦', icoCls:'am', lbl:'from ezCLI import *',
sub:'La bibliothèque qui fournit read_txt, parse et userloop',
where:'both', wlbl:'COUNT et RILEX',
txt:`Les deux programmes commencent par <strong>from ezCLI import *</strong>. Cette ligne donne accès à trois fonctions sans lesquelles les programmes ne fonctionneraient pas.
<br><br>
Pense à ezCLI comme une boîte à outils. Sans elle, il faudrait écrire soi-même le while True, la gestion de input(), l'ouverture de fichier, etc. Avec elle, tout ça est déjà prêt.`,
svg:`<svg viewBox="0 0 540 188" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:540px;display:block;margin:0 auto 4px">
<rect width="540" height="188" rx="14" fill="#FFFBEB"/>
<text x="270" y="22" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="#92400E">from ezCLI import * — les 3 outils fournis</text>
<rect x="16" y="34" width="160" height="138" rx="12" fill="white" stroke="#F59E0B" stroke-width="2"/>
<text x="96" y="58" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#92400E">read_txt(name)</text>
<text x="96" y="76" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">Lit un fichier texte</text>
<text x="96" y="90" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">et renvoie son</text>
<text x="96" y="104" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">contenu en une str</text>
<rect x="96" y="115" width="48" height="16" rx="6" fill="#FEF3C7"/>
<text x="120" y="127" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" font-weight="600" fill="#92400E">COUNT+RILEX</text>
<text x="96" y="155" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#DC2626">⚠ lève OSError</text>
<text x="96" y="167" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#DC2626">si fichier illisible</text>
<rect x="190" y="34" width="160" height="138" rx="12" fill="white" stroke="#1E3A8A" stroke-width="2"/>
<text x="270" y="58" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#1E3A8A">parse(command)</text>
<text x="270" y="76" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">Analyse la saisie</text>
<text x="270" y="90" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">→ str si 1 fichier</text>
<text x="270" y="104" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">→ list si plusieurs</text>
<rect x="244" y="115" width="48" height="16" rx="6" fill="#FEF3C7"/>
<text x="268" y="127" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" font-weight="600" fill="#92400E">COUNT+RILEX</text>
<text x="270" y="155" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">Utilisé dans</text>
<text x="270" y="167" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">parser()</text>
<rect x="364" y="34" width="160" height="138" rx="12" fill="white" stroke="#7C3AED" stroke-width="2"/>
<text x="444" y="58" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#7C3AED">userloop(fn, msg)</text>
<text x="444" y="76" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">Lance la boucle</text>
<text x="444" y="90" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">d'interaction :</text>
<text x="444" y="104" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9.5" fill="#374151">bandeau+while True</text>
<rect x="418" y="115" width="48" height="16" rx="6" fill="#FEF3C7"/>
<text x="442" y="127" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" font-weight="600" fill="#92400E">COUNT+RILEX</text>
<text x="444" y="155" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">Remplace tout</text>
<text x="444" y="167" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">le while True</text>
</svg>`,
code:`from ezCLI import *
# Cette ligne donne accès aux 3 fonctions ci-dessus.
# Sans elle, le programme plante dès le lancement.

# Utilisation en fin de fichier :
if __name__ == '__main__':
    userloop(parser, "Enter <filename> [filename ...]")
    # ↑ userloop() :
    #   - affiche le bandeau (__usage__)
    #   - fait le while True + input()
    #   - gère help, about, exit, ligne vide
    #   - appelle parser() à chaque saisie
    #   - affiche ce que parser() renvoie`,
tips:[
  'from ezCLI import * = charger les outils de la bibliothèque',
  'read_txt(name) = lire un fichier → renvoie le texte complet (str)',
  'parse(command) = analyser la saisie → str (1 fichier) ou list (plusieurs)',
  'userloop(fn, msg) = lancer toute la boucle d\'interaction automatiquement',
  'Sans ezCLI, les deux programmes ne fonctionnent pas'
]
},

// ── 2. try / except OSError ─────────────────────────────────────
{
ico:'🛡️', icoCls:'', lbl:'try: ... except OSError:',
sub:'Gérer les erreurs de lecture de fichier — COUNT et RILEX',
where:'both', wlbl:'COUNT et RILEX',
txt:`Dans les deux corrigés, la gestion d'erreur fonctionne de la même façon : au lieu de vérifier <em>avant</em> si le fichier existe, on <strong>essaie</strong> de le lire et on <strong>attrape l'erreur</strong> si ça échoue.
<br><br>
<strong>try :</strong> on tente d'exécuter le code. Si tout va bien, le bloc except est ignoré.<br>
<strong>except OSError :</strong> si read_txt() échoue (fichier inexistant ou illisible), Python saute directement ici.
<br><br>
<strong>OSError</strong> est le type d'erreur que Python lève quand on ne peut pas lire un fichier. Elle couvre les deux cas en même temps : fichier absent ET fichier sans droits de lecture.`,
svg:`<svg viewBox="0 0 540 196" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:540px;display:block;margin:0 auto 4px">
<rect width="540" height="196" rx="14" fill="#EFF6FF"/>
<text x="270" y="22" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="#1E3A8A">try / except — les 2 chemins possibles</text>
<rect x="156" y="30" width="228" height="30" rx="8" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
<text x="270" y="50" text-anchor="middle" font-family="Fira Code,monospace" font-size="11.5" font-weight="600" fill="#1E3A8A">txt = read_txt(name)</text>
<line x1="150" y1="60" x2="100" y2="86" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,2"/>
<line x1="390" y1="60" x2="440" y2="86" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="60" y="80" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" font-weight="600" fill="#059669">✅ succès</text>
<text x="480" y="80" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" font-weight="600" fill="#DC2626">❌ OSError</text>

def parser(command: str) -> str:
    tab_name = parse(command)         # parse() de ezCLI

    if type(tab_name) is str:         # 1 seul fichier → str
        return count(tab_name)        # appel direct

    else:                             # plusieurs fichiers → list
        res = ""
        for name in tab_name:
            res = res + count(name) + "\\n"
        return res.strip()            # strip() enlève le \\n final

# RILEX — parser() (même logique, syntaxe plus courte) :
def parser(command: str) -> str:
    tab_name = parse(command)

    if type(tab_name) is str:

    else:

txt:`La fonction rilex() est très différente de count(). Elle utilise un <strong>dictionnaire</strong> pour compter les mots uniques.

Points importants du corrigé RILEX :
<br>• <strong>txt.split()</strong> — sépare le texte en mots (avec ponctuation éventuelle)<br>
• <strong>len(word) &gt; 3</strong> — on ne garde que les mots de plus de 3 caractères (= 4 minimum)<br>

• <strong>histo[word.upper()] = 0</strong> — la valeur est 0, elle n'a pas d'importance : seule la <em>clé</em> compte<br>
• <strong>nb_word</strong> — compteur séparé pour les mots valides<br>
• Format <strong>:0.2</strong> et non :.2f`,

<defs><marker id="ap" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3z" fill="#7C3AED"/></marker></defs>
</svg>`,
code:`def rilex(name: str) -> str:
    try:
        txt = read_txt(name)
        tab_word = txt.split()   # ['Le', 'chat,', 'mange', 'le', 'CHAT']

        histo = dict()           # dictionnaire vide (même chose que {})
        nb_word = 0              # compteur de mots valides

        for word in tab_word:
            if len(word) > 3:           # mot de plus de 3 chars ?
                histo[word.upper()] = 0 # clé = mot en MAJUSCULES, valeur = 0 (peu importe)
                nb_word += 1            # compter ce mot valide

        # Après la boucle :
        # histo = {'CHAT,': 0, 'MANGE': 0, 'CHAT': 0}  ← 3 clés différentes
        # nb_word = 4  ← 4 mots de longueur > 3 rencontrés

        return f"{name} : rilex = {(len(histo)/nb_word):0.2}"
        # len(histo) = nb de clés = mots UNIQUES = 3
        # nb_word = mots valides rencontrés = 4
        # 3/4 = 0.75 → affiché "0.75"

    except OSError:
        return f"{name} : cannot read file"`,
tips:[

  'len(word) > 3 = plus de 3 caractères = au moins 4 caractères',
  'nb_word est un compteur séparé, pas len(tab_word)',
  ':0.2 dans le f-string = format avec 2 chiffres significatifs (pas :.2f !)'
]
}

 code:`        histo = dict()  # dictionnaire vide (= {} mais écrit autrement)
        nb_word = 0     # compteur de mots valides (longueur > 3)

        for word in tab_word:
            if len(word) > 3:            # mot de plus de 3 caractères ?
                histo[word.upper()] = 0  # clé = MOT EN MAJUSCULES, valeur = 0
                nb_word += 1             # un mot valide de plus

        # Exemple après boucle sur ['Le','chat,','mange','le','CHAT','dort']:
        # histo = {'CHAT,': 0, 'MANGE': 0, 'CHAT': 0, 'DORT': 0}  → 4 clés
        # nb_word = 4  ← 'Le' et 'le' exclus car len=2`},
{t:'rilex(name) — calculer et renvoyer le résultat',
 txt:'len(histo) = nombre de clés = mots uniques. nb_word = total des mots valides rencontrés. On divise et on formate avec :0.2 (2 chiffres significatifs). Le except OSError renvoie le même message que COUNT.',
 code:`        # Calculer la richesse lexicale
        # len(histo) = nombre de mots UNIQUES (clés du dictionnaire)
        # nb_word    = nombre total de mots valides rencontrés
        return f"{name} : rilex = {(len(histo)/nb_word):0.2}"
        # Exemple : len(histo)=3, nb_word=4 → 3/4=0.75 → "toto.txt : rilex = 0.75"

    except OSError:
        return f"{name} : cannot read file"`},
{t:'parser() — identique à COUNT sauf syntaxe',
 txt:'Même logique que COUNT. La seule différence dans le corrigé : au lieu d\'une boucle for avec res = res + ..., RILEX utilise join() avec un générateur. Les deux font exactement la même chose.',
 code:`def parser(command: str) -> str:
    """parse 'command' and return lexical richness of all provided files"""
    tab_name = parse(command)

    if type(tab_name) is str:    # 1 fichier
        return rilex(tab_name)

    else:                        # plusieurs fichiers
        return '\\n'.join(rilex(name) for name in tab_name)
        # ↑ pour chaque name dans tab_name, appelle rilex(name)
        #   puis colle tous les résultats avec '\\n' entre chaque

# ==============================================================================
if __name__ == '__main__':
    userloop(parser, "Enter <filename> [filename ...]")
# ==============================================================================`}
]};

        </div>`:''}

}
function toggleC(i){openC[i]=!openC[i];renderCours();}

function setExo(e){
  activeExo=e; openS={};
  document.getElementById('eb1').className='etab '+(e==='count'?'on':'off');
  document.getElementById('eb2').className='etab '+(e==='rilex'?'on':'off');
  renderSol();
}
function renderSol(){
  let h='';
  if(activeExo==='rilex') h+=`<div class="notebox"><strong>Structure identique à COUNT</strong> — métadonnées, import ezCLI, parser() et userloop() sont les mêmes. Seule la fonction rilex() diffère de count().</div>`;
  h+=`<div class="warnbox">Ce corrigé nécessite <strong>ezCLI</strong>. Sans cette bibliothèque, <code style="font-family:'Fira Code',monospace">read_txt()</code>, <code style="font-family:'Fira Code',monospace">parse()</code> et <code style="font-family:'Fira Code',monospace">userloop()</code> n'existent pas et le programme plante.</div>`;
  h+=STEPS[activeExo].map((s,i)=>`
    <div class="scard">
      <button class="sbtn" onclick="toggleS(${i})">
        <div class="srow"><div class="snum">${i+1}</div><div class="stit">${s.t}</div><div class="carr ${openS[i]?'open':''}">+</div></div>
      </button>
      ${openS[i]?`<div class="sbody"><p class="stxt">${s.txt}</p><pre class="code">${s.code}</pre></div>`:''}
    </div>`).join('');
  document.getElementById('sol-body').innerHTML=h;
}
function toggleS(i){openS[i]=!openS[i];renderSol();}

function renderQuiz(){
  const c=document.getElementById('quiz-body');
  if(QS.done){
    const pct=Math.round(QS.score/QUIZ.length*100);
    const msg=pct>=80?'Excellent ! Tu maîtrises les deux corrigés — prête pour le DS !'
      :pct>=60?'Bien ! Relis l\'onglet Cours sur les points qui t\'ont posé problème.'
      :'Continue à réviser — surtout les différences entre COUNT et RILEX dans l\'onglet 🔍 Différences.';
    c.innerHTML=`<div class="card" style="text-align:center;padding:32px">
      <div class="scircle"><div class="snum2">${QS.score}</div><div class="stot2">/ ${QUIZ.length}</div></div>
      <div class="spct">${pct}%</div><div class="smsg">${msg}</div>
      <button class="qbtn rst" onclick="restartQ()">🔁 Recommencer</button>
    </div>`;
    return;
  }
  const q=QUIZ[QS.idx];
  c.innerHTML=`
    <div class="qprog">
      <div class="qptop"><span class="qplbl">Question ${QS.idx+1} / ${QUIZ.length}</span><span class="qpsco">Score : ${QS.score} ✓</span></div>
      <div class="qptrack"><div class="qpfill" style="width:${QS.idx/QUIZ.length*100}%"></div></div>
    </div>
    <div class="qcard">
      <div class="qtag ${q.tag}">${q.tagLabel}</div>
      <div class="qq">${q.q}</div>
    </div>
    ${q.opts.map((o,i)=>{
      let cl='def';
      if(QS.confirmed){cl=i===q.ans?'ok':i===QS.sel?'ko':'def';}
      else if(i===QS.sel) cl='sel';
      return`<button class="opt ${cl}" onclick="${QS.confirmed?'':'selQ('+i+')'}">${o}</button>`;
    }).join('')}
    ${QS.confirmed?`<div class="expl ${QS.sel===q.ans?'ok':'ko'}"><strong>${QS.sel===q.ans?'✅ Correct !':'❌ Pas tout à fait.'}</strong> ${q.exp}</div>`:''}
    <div>${!QS.confirmed
      ?`<button class="qbtn val" ${QS.sel===null?'disabled':''} onclick="confirmQ()">Valider →</button>`
      :`<button class="qbtn nxt" onclick="nextQ()">${QS.idx+1<QUIZ.length?'Question suivante →':'Voir les résultats →'}</button>`}
    </div>`;
}
function selQ(i){QS.sel=i;renderQuiz();}
function confirmQ(){if(QS.sel===null)return;QS.confirmed=true;if(QS.sel===QUIZ[QS.idx].ans)QS.score++;renderQuiz();}
function nextQ(){QS.idx+1>=QUIZ.length?QS.done=true:(()=>{QS.idx++;QS.sel=null;QS.confirmed=false;})();renderQuiz();}
function restartQ(){QS={idx:0,sel:null,confirmed:false,score:0,done:false};renderQuiz();}

          <code class="mcode">${code}</code>
          <span class="mdesc">${desc}</span>
          <span class="mexo ${exo}">${exo==='b'?'B1+B2':exo==='c'?'B1 COUNT':'B2 RILEX'}</span>
        </div>`).join('')}
    </div>`).join('');
}

renderCours(); renderSol(); renderDiff(); renderQuiz(); renderMemo();
</script>
</body>
</html>
