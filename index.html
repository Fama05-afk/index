.qbtn.rst{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white}
.scircle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 28px rgba(30,58,138,.3)}
.snum2{font-size:40px;font-weight:700;line-height:1}.stot{font-size:15px;opacity:.8}
.spct{font-size:17px;font-weight:600;color:#F59E0B;margin-bottom:6px}
.smsg{font-size:13.5px;color:#6B7280;max-width:300px;margin:0 auto 24px;line-height:1.65}
.msec{background:white;border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.mhdr{padding:11px 18px;display:flex;align-items:center;gap:8px}
.mhdr.bl{background:linear-gradient(135deg,#1E3A8A,#2563EB)}.mhdr.am{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.mhdr.gr{background:linear-gradient(135deg,#059669,#10B981)}.mhdr.rd{background:linear-gradient(135deg,#DC2626,#EF4444)}

.mcat{font-size:13px;font-weight:700;color:white}
.mrow{display:flex;align-items:flex-start;gap:10px;padding:9px 18px;border-bottom:1px solid #FEF3C7}
.mrow:last-child{border-bottom:none}

</style>

<script>
// ══════════════════════════════════════════════════════
// CONCEPTS — basés sur le corrigé officiel
// ══════════════════════════════════════════════════════
const CONCEPTS = [
{
  ico:'📦', icoCls:'am',
  lbl:'from ezCLI import *',
  sub:'La bibliothèque du prof qui remplace beaucoup de code',
  where:'both', wlbl:'COUNT et RILEX',
  txt:`Le prof utilise une bibliothèque personnelle <strong>ezCLI</strong> qui fournit des fonctions prêtes à l'emploi. Elle remplace tout ce qu'on aurait écrit à la main (while True, input, os...).
<br><br>
3 fonctions essentielles à retenir : <strong>read_txt()</strong>, <strong>parse()</strong> et <strong>userloop()</strong>.`,
  svg:`<svg viewBox="0 0 520 185" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:520px;display:block;margin:0 auto 4px">
  <rect width="520" height="185" rx="14" fill="#FFFBEB"/>
  <text x="260" y="22" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="#92400E">from ezCLI import * — ce que ça apporte</text>
  <rect x="18" y="34" width="148" height="132" rx="12" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="92" y="56" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#92400E">read_txt(name)</text>
  <text x="92" y="75" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">Lit un fichier texte</text>
  <text x="92" y="89" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">et renvoie son</text>
  <text x="92" y="103" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">contenu (str)</text>
  <text x="92" y="120" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">Lève OSError si</text>
  <text x="92" y="132" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#DC2626">fichier illisible</text>
  <rect x="186" y="34" width="148" height="132" rx="12" fill="white" stroke="#1E3A8A" stroke-width="2"/>
  <text x="260" y="56" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#1E3A8A">parse(command)</text>
  <text x="260" y="75" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">Découpe la saisie</text>
  <text x="260" y="89" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">→ str si 1 fichier</text>
  <text x="260" y="103" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">→ list si plusieurs</text>
  <text x="260" y="120" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">Gère aussi help,</text>
  <text x="260" y="132" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">about, exit...</text>
  <rect x="354" y="34" width="148" height="132" rx="12" fill="white" stroke="#7C3AED" stroke-width="2"/>
  <text x="428" y="56" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#7C3AED">userloop(fn, msg)</text>
  <text x="428" y="75" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">Lance la boucle</text>
  <text x="428" y="89" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">d'interaction</text>
  <text x="428" y="103" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">complète</text>
  <text x="428" y="120" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">Remplace le</text>
  <text x="428" y="132" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" fill="#6B7280">while True entier</text>
  <text x="260" y="175" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#6B7280">Ces 3 fonctions sont disponibles grâce à : from ezCLI import *</text>
</svg>`,
  code:`from ezCLI import *
# Cette ligne donne accès à :
# - read_txt(name)   → lire un fichier
# - parse(command)   → découper la saisie
# - userloop(fn, msg) → gérer la boucle d'interaction

# Dans le programme principal :
if __name__ == '__main__':
    userloop(parser, "Enter <filename> [filename ...]")
    # ↑ userloop appelle parser() automatiquement
    #   à chaque saisie de l'utilisateur`,
  tips:['from ezCLI import * = importer TOUT ce que ezCLI contient','read_txt() remplace open() + f.read() + gestion OSError','parse() remplace saisie.split() et gère les cas spéciaux','userloop() remplace le while True entier']
},
{
  ico:'📂', icoCls:'',
  lbl:'read_txt(name) + try/except OSError',
  sub:'Lire un fichier et gérer l\'erreur — COUNT et RILEX',
  where:'both', wlbl:'COUNT et RILEX',
  txt:`Dans le corrigé, le prof n'utilise <strong>pas</strong> os.path.isfile() ni os.access(). À la place, il utilise <strong>try/except</strong> :
<br><br>
• <strong>try</strong> : on essaie de lire le fichier avec read_txt()<br>
• <strong>except OSError</strong> : si ça échoue (fichier inexistant ou illisible), on attrape l'erreur et on renvoie le message d'erreur
<br><br>
C'est une approche différente mais équivalente — au lieu de vérifier <em>avant</em>, on essaie et on gère le problème <em>si</em> ça échoue.`,
  svg:`<svg viewBox="0 0 520 190" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:520px;display:block;margin:0 auto 4px">
  <rect width="520" height="190" rx="14" fill="#EFF6FF"/>
  <text x="260" y="22" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="#1E3A8A">try/except — comment ça fonctionne</text>
  <rect x="18" y="34" width="484" height="36" rx="8" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="260" y="50" text-anchor="middle" font-family="Fira Code,monospace" font-size="11" font-weight="600" fill="#1E3A8A">try:</text>
  <text x="260" y="63" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">Python essaie d'exécuter le code à l'intérieur</text>
  <line x1="130" y1="70" x2="90" y2="100" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="390" y1="70" x2="430" y2="100" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="18" y="100" width="215" height="52" rx="10" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="125" y="118" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10.5" font-weight="600" fill="#065F46">✅ Si tout va bien</text>
  <text x="125" y="134" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">read_txt() renvoie le texte</text>
  <text x="125" y="147" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">→ on continue le traitement</text>
  <rect x="287" y="100" width="215" height="52" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="2"/>
  <text x="394" y="118" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10.5" font-weight="600" fill="#DC2626">❌ Si erreur (OSError)</text>
  <text x="394" y="134" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">except OSError: attrape l'erreur</text>
  <text x="394" y="147" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#374151">→ on renvoie "cannot read file"</text>
  <rect x="100" y="164" width="320" height="20" rx="8" fill="#FEF9C3" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="260" y="178" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" font-weight="600" fill="#92400E">OSError couvre : fichier inexistant ET fichier illisible</text>
</svg>`,
  code:`def count(name: str) -> str:
    try:
        txt = read_txt(name)      # essayer de lire le fichier
        # ... traitement du texte ...
        return f"{name} : lines = ..."

    except OSError:               # si read_txt() échoue
        return f"{name} : cannot read file"
        #  ↑ OSError est levée si :
        #    - le fichier n'existe pas
        #    - on n'a pas le droit de le lire`,
  tips:['try: → on essaie d\'exécuter le code','except OSError: → si read_txt() échoue, on arrive ici','OSError couvre à la fois "fichier inexistant" et "illisible"','C\'est différent de os.path.isfile() mais le résultat est le même']
},
{
  ico:'🔁', icoCls:'',
  lbl:'parse(command) + type(x) is str',
  sub:'Découper la saisie — 1 fichier ou plusieurs ?',
  where:'both', wlbl:'COUNT et RILEX',
  txt:`<strong>parse(command)</strong> analyse la saisie de l'utilisateur. Son comportement dépend du nombre de fichiers :
<br><br>
• <strong>1 seul fichier</strong> → renvoie une <strong>str</strong> (chaîne de caractères)<br>

def rilex(name: str) -> str:
    try:
        txt = read_txt(name)

        # Extraire les mots valides (≥4 lettres, minuscules)
        bruts = re.findall(r'[a-zA-Z]+', txt)
        mots  = [m.lower() for m in bruts if len(m) >= 4]

        if len(mots) == 0:
            return f"{name} : no valid words found"

        # Compter les occurrences avec un dictionnaire
        compteur = {}
        for mot in mots:
            if mot in compteur: compteur[mot] += 1
            else: compteur[mot] = 1

        # Calculer et renvoyer la richesse lexicale
        r = len(compteur) / len(mots)
        return f"{name} : rilex = {r:.2f}"

    except OSError:

function setExo(e){
  activeExo=e; openS={};
  document.getElementById('eb1').className='etab '+(e==='count'?'on':'off');
  document.getElementById('eb2').className='etab '+(e==='rilex'?'on':'off');
  renderSol();
}
function renderSol(){
  const steps=STEPS[activeExo];
  let h='';
  if(activeExo==='rilex'){
    h+=`<div class="notebox"><strong>Rappel :</strong> RILEX a la même structure que COUNT. Métadonnées, import, parser() et userloop() sont identiques. Seule la fonction de traitement change — c'est ce qu'on détaille ici.</div>`;
  }
  if(activeExo==='count'){
    h+=`<div class="warnbox">Ce corrigé utilise <strong>ezCLI</strong> (bibliothèque du prof). Les fonctions <code style="font-family:'Fira Code',monospace">read_txt()</code>, <code style="font-family:'Fira Code',monospace">parse()</code> et <code style="font-family:'Fira Code',monospace">userloop()</code> viennent de là. Sans cette biblio, le programme ne tourne pas.</div>`;
  }
  h+=steps.map((s,i)=>`
    <div class="scard">
      <button class="sbtn" onclick="toggleS(${i})">
        <div class="srow"><div class="snum">${i+1}</div><div class="stitle">${s.t}</div><div class="carr ${openS[i]?'open':''}">+</div></div>
      </button>
      ${openS[i]?`<div class="sbody"><p class="stxt">${s.txt}</p><pre class="code">${s.code}</pre></div>`:''}
    </div>`).join('');
  document.getElementById('sol-body').innerHTML=h;
}
function toggleS(i){openS[i]=!openS[i];renderSol();}

// QUIZ
// ══════════════════════════════════════════════════════
function renderQuiz(){
  const c=document.getElementById('quiz-body');
  if(QS.done){
    const pct=Math.round(QS.score/QUIZ.length*100);
    const msg=pct>=80?'Excellent ! Tu maîtrises le corrigé — bonne chance pour le DS !':pct>=60?'Bien ! Relis les fiches Cours sur ce qui t\'a posé problème.':'Continue à réviser — le corrigé a ses particularités, relis bien ezCLI et try/except.';
    c.innerHTML=`<div class="card" style="text-align:center;padding:32px">
      <div class="scircle"><div class="snum2">${QS.score}</div><div class="stot">/ ${QUIZ.length}</div></div>
      <div class="spct">${pct}%</div><div class="smsg">${msg}</div>
      <button class="qbtn rst" onclick="restartQ()">🔁 Recommencer</button>
    </div>`;
    return;
  }
  const q=QUIZ[QS.idx];
  const pct=QS.idx/QUIZ.length*100;
  c.innerHTML=`
    <div class="qprog">
      <div class="qptop"><span class="qplbl">Question ${QS.idx+1} / ${QUIZ.length}</span><span class="qpsco">Score : ${QS.score} ✓</span></div>
      <div class="qptrack"><div class="qpfill" style="width:${pct}%"></div></div>
    </div>
    <div class="qcard">
      <div class="qtag ${q.tag}">${q.tagLabel}</div>
      <div class="qq">${q.q}</div>
    </div>
    ${q.opts.map((o,i)=>{
      let cl='def';
      if(QS.confirmed){cl=i===q.ans?'ok':i===QS.sel?'ko':'def';}
      else if(i===QS.sel) cl='sel';
      return`<button class="opt ${cl}" onclick="${QS.confirmed?'':'selQ('+i+')'}">${o}</button>`;
    }).join('')}
    ${QS.confirmed?`<div class="expl ${QS.sel===q.ans?'ok':'ko'}"><strong>${QS.sel===q.ans?'✅ Correct !':'❌ Pas tout à fait.'}</strong> ${q.exp}</div>`:''}
    <div>${!QS.confirmed
      ?`<button class="qbtn val" ${QS.sel===null?'disabled':''} onclick="confirmQ()">Valider →</button>`
      :`<button class="qbtn nxt" onclick="nextQ()">${QS.idx+1<QUIZ.length?'Question suivante →':'Voir les résultats →'}</button>`}
    </div>`;
}
function selQ(i){QS.sel=i;renderQuiz();}
function confirmQ(){if(QS.sel===null)return;QS.confirmed=true;if(QS.sel===QUIZ[QS.idx].ans)QS.score++;renderQuiz();}
function nextQ(){QS.idx+1>=QUIZ.length?QS.done=true:(()=>{QS.idx++;QS.sel=null;QS.confirmed=false;})();renderQuiz();}
function restartQ(){QS={idx:0,sel:null,confirmed:false,score:0,done:false};renderQuiz();}
