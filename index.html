<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS Python — COUNT & RILEX</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#FFFBEB 0%,#FEF3C7 60%,#FDE68A 100%);min-height:100vh;padding:20px}
.wrap{max-width:860px;margin:0 auto}

/* HEADER */
.hdr{background:white;padding:24px 32px;border-radius:22px;margin-bottom:22px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;border:2px solid #F59E0B;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#1E3A8A,#F59E0B,#1E3A8A)}
.hdr-title{font-size:26px;font-weight:700;color:#1E3A8A;margin-bottom:4px}
.hdr-sub{font-size:14px;color:#6B7280;font-style:italic}
.hdr-badge{display:inline-block;background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white;font-size:11px;font-weight:600;padding:3px 14px;border-radius:50px;margin-top:8px}

/* TABS */
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
.tab{padding:11px 24px;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;font-family:'Poppins',sans-serif;background:white;color:#6B7280;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.tab.on{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;transform:translateY(-3px);box-shadow:0 8px 24px rgba(30,58,138,.3)}
.tab:hover:not(.on){transform:translateY(-2px);color:#1E3A8A}
.pane{display:none}.pane.on{display:block;animation:up .35s ease}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.card{background:white;border-radius:18px;padding:24px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.07);border:1.5px solid #FDE68A;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.10)}
.card.bl{border-left:5px solid #1E3A8A}
.card.am{border-left:5px solid #F59E0B}
.card.pu{border-left:5px solid #7C3AED}
.card.gr{border-left:5px solid #059669}

/* CODE */
.code{background:#0F172A;color:#E2E8F0;font-family:'Fira Code',monospace;font-size:12px;line-height:1.75;padding:16px 18px;border-radius:12px;overflow-x:auto;white-space:pre;margin:12px 0;border:1.5px solid #1E3A8A}

/* CONCEPT */
.cbtn{width:100%;background:none;border:none;cursor:pointer;text-align:left;padding:0;font-family:'Poppins',sans-serif}
.crow{display:flex;align-items:center;gap:12px}
.cico{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cico.am{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.cico.pu{background:linear-gradient(135deg,#7C3AED,#8B5CF6)}
.clbl{font-family:'Fira Code',monospace;font-size:13px;font-weight:500;color:#1E3A8A;margin-bottom:2px}
.csub{font-size:12.5px;color:#6B7280}
.carr{margin-left:auto;width:30px;height:30px;border-radius:50%;background:#F3F4F6;display:flex;align-items:center;justify-content:center;font-size:17px;color:#9CA3AF;transition:all .25s;flex-shrink:0}
.carr.open{background:#FEF3C7;color:#F59E0B;transform:rotate(45deg)}
.cdet{margin-top:16px;padding-top:16px;border-top:1.5px dashed #FDE68A}
.ctxt{font-size:13.5px;color:#374151;line-height:1.7;margin-bottom:14px}

/* WHERE label */
.where{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:600;margin-bottom:12px}
.where.count{background:#DBEAFE;color:#1E3A8A}
.where.rilex{background:#EDE9FE;color:#7C3AED}
.where.both{background:#D1FAE5;color:#065F46}

/* TIPS */
.tips{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.tip{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#374151;line-height:1.5}
.tdot{width:7px;height:7px;border-radius:50%;background:#F59E0B;flex-shrink:0;margin-top:5px}

/* STEPS */
.etabs{display:flex;gap:8px;margin-bottom:18px}
.etab{padding:9px 24px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all .22s;font-family:'Poppins',sans-serif;border:2px solid transparent}
.etab.on{background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white;box-shadow:0 4px 12px rgba(245,158,11,.35)}
.etab.off{background:white;color:#6B7280;border-color:#E5E7EB}
.etab.off:hover{border-color:#F59E0B;color:#F59E0B}
.scard{background:white;border-radius:18px;padding:20px 24px;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,.07);border:1.5px solid #FDE68A;transition:all .2s}
.scard:hover{transform:translateY(-2px);box-shadow:0 7px 22px rgba(0,0,0,.10)}
.sbtn{width:100%;background:none;border:none;cursor:pointer;text-align:left;padding:0;font-family:'Poppins',sans-serif}
.srow{display:flex;align-items:center;gap:12px}
.snum{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stitle{font-size:14px;font-weight:600;color:#1E3A8A;flex:1}
.sbody{margin-top:14px;padding-top:14px;border-top:1.5px dashed #FDE68A}
.stxt{font-size:13px;color:#374151;line-height:1.7;margin-bottom:12px}
.notebox{background:linear-gradient(135deg,#ECFDF5,#D1FAE5);border:1.5px solid #6EE7B7;border-radius:12px;padding:13px 16px;font-size:13px;color:#065F46;line-height:1.65;margin-bottom:16px}

/* QUIZ */
.qprog{margin-bottom:20px}
.qptop{display:flex;justify-content:space-between;margin-bottom:6px}
.qplbl{font-size:13px;font-weight:600;color:#1E3A8A}
.qpsco{font-size:13px;color:#6B7280}
.qptrack{height:7px;background:#E5E7EB;border-radius:50px;overflow:hidden}
.qpfill{height:100%;background:linear-gradient(90deg,#1E3A8A,#F59E0B);border-radius:50px;transition:width .4s ease}
.qcard{background:white;border-radius:18px;padding:24px;margin-bottom:14px;box-shadow:0 4px 18px rgba(0,0,0,.08);border:2px solid #1E3A8A}
.qtag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;padding:3px 10px;border-radius:50px;display:inline-block}
.qtag.count{background:#DBEAFE;color:#1E3A8A}
.qtag.rilex{background:#EDE9FE;color:#7C3AED}
.qtag.both{background:#D1FAE5;color:#065F46}
.qq{font-family:'Fira Code',monospace;font-size:13.5px;font-weight:500;color:#1E3A8A;line-height:1.6}
.opt{display:block;width:100%;text-align:left;padding:11px 14px;border-radius:12px;cursor:pointer;margin-bottom:8px;font-size:13px;font-family:'Fira Code',monospace;line-height:1.4;transition:all .18s}
.opt.def{border:1.5px solid #E5E7EB;background:white;color:#374151}
.opt.def:hover{border-color:#1E3A8A;background:#EFF6FF;color:#1E3A8A;transform:translateX(4px)}
.opt.sel{border:2px solid #F59E0B;background:#FFFBEB;color:#92400E}
.opt.ok{border:2px solid #10B981;background:#ECFDF5;color:#065F46}
.opt.ko{border:2px solid #EF4444;background:#FEF2F2;color:#991B1B}
.expl{border-radius:12px;padding:13px 16px;font-size:13px;line-height:1.65;margin-bottom:14px}
.expl.ok{background:#ECFDF5;border:1.5px solid #6EE7B7;color:#065F46}
.expl.ko{background:#FFFBEB;border:1.5px solid #F59E0B;color:#92400E}
.qbtn{padding:12px 28px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .22s;font-family:'Poppins',sans-serif;border:none}
.qbtn.val{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;box-shadow:0 4px 12px rgba(30,58,138,.25)}
.qbtn.val:hover{transform:translateY(-2px);box-shadow:0 7px 18px rgba(30,58,138,.35)}
.qbtn.val:disabled{background:#E5E7EB;color:#9CA3AF;box-shadow:none;cursor:not-allowed;transform:none}
.qbtn.nxt{background:linear-gradient(135deg,#F59E0B,#FBBF24);color:white;box-shadow:0 4px 12px rgba(245,158,11,.25)}
.qbtn.nxt:hover{transform:translateY(-2px)}
.qbtn.rst{background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white}
.scircle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 28px rgba(30,58,138,.3)}
.snum2{font-size:40px;font-weight:700;line-height:1}
.stot{font-size:15px;opacity:.8}
.spct{font-size:17px;font-weight:600;color:#F59E0B;margin-bottom:6px}
.smsg{font-size:13.5px;color:#6B7280;max-width:300px;margin:0 auto 24px;line-height:1.65}

/* MEMO */
.msec{background:white;border-radius:18px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.mhdr{padding:11px 18px;display:flex;align-items:center;gap:8px}
.mhdr.bl{background:linear-gradient(135deg,#1E3A8A,#2563EB)}
.mhdr.am{background:linear-gradient(135deg,#F59E0B,#FBBF24)}
.mhdr.gr{background:linear-gradient(135deg,#059669,#10B981)}
.mhdr.rd{background:linear-gradient(135deg,#DC2626,#EF4444)}
.mhdr.pu{background:linear-gradient(135deg,#7C3AED,#8B5CF6)}
.mhdr.gy{background:linear-gradient(135deg,#4B5563,#6B7280)}
.mcat{font-size:13px;font-weight:700;color:white}
.mrow{display:flex;align-items:flex-start;gap:12px;padding:9px 18px;border-bottom:1px solid #FEF3C7}
.mrow:last-child{border-bottom:none}
.mcode{font-family:'Fira Code',monospace;font-size:12px;color:#1E3A8A;font-weight:500;flex-shrink:0;min-width:190px}
.mdesc{font-size:12.5px;color:#4B5563;line-height:1.5}
.mexo{font-size:10px;font-weight:600;padding:2px 7px;border-radius:50px;flex-shrink:0;margin-left:auto}
.mexo.c{background:#DBEAFE;color:#1E3A8A}
.mexo.r{background:#EDE9FE;color:#7C3AED}
.mexo.b{background:#D1FAE5;color:#065F46}
</style>
</head>

<div class="wrap">

<div class="hdr">
  <div class="hdr-title">🐍 Préparation DS — Python Fichiers</div>

</div>

<script>
// ════════════════════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════════════════════

const CONCEPTS = [
{
  ico:'🔁', icoCls:'',
  lbl:'while True + break',
  sub:'La boucle qui fait tourner COUNT et RILEX',
  where:'both', whereLabel:'COUNT et RILEX',
  txt:`Dans <strong>les deux programmes</strong>, le cœur c'est une boucle infinie. 
Le programme demande en boucle des noms de fichiers à l'utilisateur — et il s'arrête SEULEMENT quand l'utilisateur tape "exit" ou appuie sur Entrée sans rien écrire.
<br><br>
Imagine un distributeur automatique : il attend ta commande, la traite, et recommence indéfiniment. <strong>break</strong> c'est le bouton "éteindre".`,
  svg:`<svg viewBox="0 0 520 192" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:520px;display:block;margin:0 auto 4px">

  <rect x="18" y="34" width="90" height="32" rx="16" fill="#1E3A8A"/>
  <text x="63" y="55" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" font-weight="600" fill="white">DÉMARRAGE</text>
  <line x1="108" y1="50" x2="134" y2="50" stroke="#1E3A8A" stroke-width="2" marker-end="url(#a1)"/>
  <rect x="136" y="34" width="112" height="32" rx="8" fill="#DBEAFE" stroke="#1E3A8A" stroke-width="1.5"/>
  <text x="192" y="54" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#1E3A8A">input() → saisie</text>
  <line x1="248" y1="50" x2="272" y2="50" stroke="#1E3A8A" stroke-width="2" marker-end="url(#a1)"/>
  <polygon points="304,32 348,50 304,68 260,50" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="304" y="47" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" font-weight="600" fill="#92400E">exit ou</text>
  <text x="304" y="60" text-anchor="middle" font-family="Poppins,sans-serif" font-size="9" font-weight="600" fill="#92400E">vide ?</text>
  <line x1="348" y1="50" x2="388" y2="50" stroke="#F59E0B" stroke-width="2" marker-end="url(#a2)"/>
  <text x="366" y="44" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" font-weight="600" fill="#92400E">OUI</text>
  <rect x="388" y="34" width="116" height="32" rx="8" fill="#FEF9C3" stroke="#F59E0B" stroke-width="2"/>
  <text x="446" y="48" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="#92400E">break</text>
  <text x="446" y="61" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#92400E">→ programme terminé</text>
  <line x1="304" y1="68" x2="304" y2="96" stroke="#059669" stroke-width="2" marker-end="url(#a3)"/>
  <text x="316" y="87" font-family="Poppins,sans-serif" font-size="10" fill="#059669" font-weight="600">NON</text>
  <rect x="168" y="100" width="272" height="32" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
  <text x="304" y="120" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10.5" fill="#065F46">help/about → afficher  |  fichiers → traiter</text>
  <line x1="168" y1="116" x2="80" y2="116" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="80" y1="116" x2="80" y2="50" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a4)"/>
  <text x="122" y="148" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#6366F1" font-style="italic">↺ recommencer depuis le début !</text>
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#1E3A8A"/></marker>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#F59E0B"/></marker>
    <marker id="a3" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#059669"/></marker>
    <marker id="a4" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#6366F1"/></marker>
  </defs>
</svg>`,
  code:`# Dans COUNT et RILEX — structure identique
while True:
    saisie = input("<> <filename> [filename ...]: ").strip()

    if saisie == "" or saisie == "exit":
        break                      # ← sortir de la boucle

    elif saisie in ("help", "?"):
        print(AIDE)

    elif saisie in ("about", "!"):
        print(A_PROPOS)

    else:
        fichiers = saisie.split()  # découper en liste
        for nom in fichiers:
            traiter_fichier(nom)   # traiter chaque fichier`,
  tips:['while True = boucle infinie — ne s\'arrête jamais seule','break = quitter la boucle (exit ou ligne vide)','strip() = enlever les espaces en début/fin de saisie','Cette structure est IDENTIQUE dans COUNT et dans RILEX']
},
{
  ico:'📂', icoCls:'',
  lbl:'os.path.isfile() + os.access()',
  sub:'Vérifier un fichier avant de l\'ouvrir — COUNT et RILEX',
  where:'both', whereLabel:'COUNT et RILEX',
  txt:`Dans <strong>les deux programmes</strong>, avant de toucher à un fichier, on pose 2 questions dans l'ordre.
<br><br>
C'est comme avant d'ouvrir une porte : d'abord on vérifie <strong>qu'elle existe</strong>, ensuite <strong>qu'on a la clé</strong>. Si une vérification échoue → on affiche un message d'erreur et on fait <strong>return</strong> (on s'arrête là, sans aller plus loin).`,
  svg:`<svg viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:520px;display:block;margin:0 auto 4px">
  <rect width="520" height="200" rx="14" fill="#FEF2F2"/>
  <text x="260" y="22" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="600" fill="#991B1B">2 vérifications obligatoires — COUNT et RILEX</text>
  <rect x="18" y="36" width="234" height="78" rx="14" fill="white" stroke="#DC2626" stroke-width="2"/>
  <text x="135" y="56" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="#DC2626">❓ Vérification 1</text>
  <text x="135" y="73" text-anchor="middle" font-family="Poppins,sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Le fichier existe-t-il ?</text>
  <text x="135" y="90" text-anchor="middle" font-family="Fira Code,monospace" font-size="10" fill="#374151">os.path.isfile(nom)</text>
  <rect x="30" y="122" width="210" height="28" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="135" y="140" text-anchor="middle" font-family="Fira Code,monospace" font-size="10" fill="#991B1B">print(f"{nom} : file not found")</text>
  <text x="135" y="165" text-anchor="middle" font-family="Fira Code,monospace" font-size="10.5" font-weight="600" fill="#DC2626">return ← STOP</text>
  <line x1="270" y1="75" x2="296" y2="75" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="270" y="36" width="234" height="78" rx="14" fill="white" stroke="#F59E0B" stroke-width="2"/>
  <text x="387" y="56" text-anchor="middle" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="#F59E0B">❓ Vérification 2</text>
  <text x="387" y="73" text-anchor="middle" font-family="Poppins,sans-serif" font-size="12" font-weight="600" fill="#1E3A8A">Peut-on le lire ?</text>
  <text x="387" y="90" text-anchor="middle" font-family="Fira Code,monospace" font-size="10" fill="#374151">os.access(nom, os.R_OK)</text>
  <rect x="280" y="122" width="215" height="28" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="387" y="140" text-anchor="middle" font-family="Fira Code,monospace" font-size="10" fill="#92400E">print(f"{nom} : cannot read file")</text>
  <text x="387" y="165" text-anchor="middle" font-family="Fira Code,monospace" font-size="10.5" font-weight="600" fill="#F59E0B">return ← STOP</text>
  <text x="260" y="190" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#059669" font-weight="600">✓ Si les 2 passent → on ouvre le fichier normalement</text>
</svg>`,
  code:`import os

def traiter_fichier(nom):     # même code dans COUNT et RILEX
    # Question 1 : le fichier existe-t-il ?
    if not os.path.isfile(nom):

function setExo(e){
  activeExo=e; openS={};
  document.getElementById('eb1').className='etab '+(e==='count'?'on':'off');
  document.getElementById('eb2').className='etab '+(e==='rilex'?'on':'off');
  renderSol();
}

function renderSol(){
  const steps=STEPS[activeExo];
  let h='';
  if(activeExo==='rilex'){
    h+=`<div class="notebox">
      <strong>Rappel :</strong> RILEX a la même structure que COUNT. La boucle, les commandes (help/about/exit) et les vérifications os sont identiques. Seule la partie traitement dans traiter_fichier() change — c'est ça qu'on détaille ici.
    </div>`;
  }
  h+=steps.map((s,i)=>`
    <div class="scard">
      <button class="sbtn" onclick="toggleS(${i})">
        <div class="srow">
          <div class="snum">${i+1}</div>
          <div class="stitle">${s.t}</div>
          <div class="carr ${openS[i]?'open':''}">+</div>
        </div>
      </button>
      ${openS[i]?`
        <div class="sbody">
          <p class="stxt">${s.txt}</p>
          <pre class="code">${s.code}</pre>
        </div>`:''}
    </div>`).join('');
  document.getElementById('sol-body').innerHTML=h;
}

function toggleS(i){openS[i]=!openS[i];renderSol();}

      <div class="scircle"><div class="snum2">${QS.score}</div><div class="stot">/ ${QUIZ.length}</div></div>
      <div class="spct">${pct}%</div>
      <div class="smsg">${msg}</div>
      <button class="qbtn rst" onclick="restartQ()">🔁 Recommencer</button>
    </div>`;
    return;
  }
  const q=QUIZ[QS.idx];
  const pct=QS.idx/QUIZ.length*100;
  c.innerHTML=`
    <div class="qprog">
      <div class="qptop"><span class="qplbl">Question ${QS.idx+1} / ${QUIZ.length}</span><span class="qpsco">Score : ${QS.score} ✓</span></div>
      <div class="qptrack"><div class="qpfill" style="width:${pct}%"></div></div>
    </div>
    <div class="qcard">
      <div class="qtag ${q.tag}">${q.tagLabel}</div>
      <div class="qq">${q.q}</div>
    </div>
    ${q.opts.map((o,i)=>{
      let cl='def';
      if(QS.confirmed){cl=i===q.ans?'ok':i===QS.sel?'ko':'def';}
      else if(i===QS.sel) cl='sel';
      return`<button class="opt ${cl}" onclick="${QS.confirmed?'':' selQ('+i+')'}">${o}</button>`;
    }).join('')}
    ${QS.confirmed?`<div class="expl ${QS.sel===q.ans?'ok':'ko'}"><strong>${QS.sel===q.ans?'✅ Correct !':'❌ Pas tout à fait.'}</strong> ${q.exp}</div>`:''}
    <div>
      ${!QS.confirmed
        ?`<button class="qbtn val" ${QS.sel===null?'disabled':''} onclick="confirmQ()">Valider →</button>`
        :`<button class="qbtn nxt" onclick="nextQ()">${QS.idx+1<QUIZ.length?'Question suivante →':'Voir les résultats →'}</button>`}
    </div>`;
}

function selQ(i){QS.sel=i;renderQuiz();}
function confirmQ(){if(QS.sel===null)return;QS.confirmed=true;if(QS.sel===QUIZ[QS.idx].ans)QS.score++;renderQuiz();}
function nextQ(){if(QS.idx+1>=QUIZ.length){QS.done=true;}else{QS.idx++;QS.sel=null;QS.confirmed=false;}renderQuiz();}
function restartQ(){QS={idx:0,sel:null,confirmed:false,score:0,done:false};renderQuiz();}

// ════════════════════════════════════════════════════════════════
// MEMO
// ════════════════════════════════════════════════════════════════

function renderMemo(){
  document.getElementById('memo-body').innerHTML=MEMO.map(m=>`
    <div class="msec">
      <div class="mhdr ${m.hcls}"><span class="mcat">${m.cat}</span></div>
      ${m.rows.map(([code,desc,exo])=>`
        <div class="mrow">
          <code class="mcode">${code}</code>
          <span class="mdesc">${desc}</span>
          <span class="mexo ${exo}">${exo==='b'?'B1+B2':exo==='c'?'B1 COUNT':'B2 RILEX'}</span>
        </div>`).join('')}
    </div>`).join('');
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════

renderCours();
renderSujet();
renderSol();
renderQuiz();
renderMemo();
</script>
